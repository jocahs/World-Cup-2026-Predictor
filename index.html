 </div>

 <script> 
 const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwpCcE5YPBRwZQInCcxeAdz1iZxdtlBRrctvtRXsqY3dCuSd5Xhq1eL2F-2pF0KxEU8/exec";
 const ADMIN_PASSWORD = "wc2026";
 
 let actualResults = {};
 let allPicks = [];
 let currentPlayers = [];
 let isLoading = false;
 let isAdminMode = false;
 let groupMatches = {};

 // Helper function to parse match date and time
function parseMatchDateTime(dateStr, timeStr) {
   if (!dateStr || !timeStr) return null;
   
   let year, month, day, hour, minute;
   
   // Parse the time
   const timeParts = timeStr.match(/(\d{2}):(\d{2})/);
   if (!timeParts) return null;
   hour = parseInt(timeParts[1]);
   minute = parseInt(timeParts[2]);
   
   // Handle ISO format (coming from Google Sheets)
   if (dateStr.includes('T')) {
     const utcDate = new Date(dateStr);
     // For Portugal (UTC+1), add 1 hour to get local time
     const localDate = new Date(utcDate.getTime() + 60 * 60 * 1000);
     year = localDate.getFullYear();
     month = localDate.getMonth();
     day = localDate.getDate();
   }
   // Handle DD/MM/YYYY format
   else if (dateStr.includes('/')) {
     const parts = dateStr.split('/');
     day = parseInt(parts[0]);
     month = parseInt(parts[1]) - 1;
     year = parseInt(parts[2]) || 2026;
   }
   else {
     return null;
   }
   
   // Create date with local components
   return new Date(year, month, day, hour, minute);
}

function formatDisplayDate(dateStr, timeStr) {
   if (!dateStr || dateStr === '') {
     return timeStr || '';
   }
   
   let day, month;
   
   // Handle ISO format "2026-06-14T23:00:00.000Z"
   if (dateStr.includes('T') || dateStr.includes('-')) {
     const date = new Date(dateStr);
     // Adjust to local time (Portugal)
     const localDate = new Date(date.getTime());
     day = localDate.getDate();
     month = localDate.getMonth() + 1;
   }
   // Handle format "DD/MM/YYYY"
   else if (dateStr.includes('/')) {
     const parts = dateStr.split('/');
     day = parseInt(parts[0]);
     month = parseInt(parts[1]);
   }
   else {
     return timeStr;
   }
   
   const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
   return `${monthNames[month - 1]} ${day} ${timeStr}`;
}

function isWithinThreeHoursAfter(matchDateTime) {
   if (!matchDateTime) return false;
   const now = new Date();
   const threeHoursAfter = new Date(matchDateTime.getTime() + 3 * 60 * 60 * 1000);
   return now.getTime() <= threeHoursAfter.getTime();
}

// Google Calendar URL generator - SIMPLIFIED (date is already DD/MM/YYYY)
function getGoogleCalendarUrl(matchName, homeTeam, visitorTeam, dateStr, timeStr, transmission) {
   // Parse DD/MM/YYYY date
   const dateParts = dateStr.split('/');
   if (dateParts.length !== 3) return null;
   
   const day = parseInt(dateParts[0]);
   const month = parseInt(dateParts[1]);
   const year = parseInt(dateParts[2]);
   
   // Parse time
   const timeParts = timeStr.match(/(\d{2}):(\d{2})/);
   if (!timeParts) return null;
   const hour = parseInt(timeParts[1]);
   const minute = parseInt(timeParts[2]);
   
   // Format numbers with leading zeros
   const pad = (n) => String(n).padStart(2, '0');
   
   // Create date strings for Google Calendar (local time)
   const startDate = `${year}${pad(month)}${pad(day)}T${pad(hour)}${pad(minute)}00`;
   const endDate = `${year}${pad(month)}${pad(day)}T${pad(hour + 2)}${pad(minute)}00`;
   
   const title = `${homeTeam} vs ${visitorTeam}`;
   let watchLink = '';
   if (transmission && transmission.includes('LiveModeTV')) {
     watchLink = '\n\n📺 Watch Live: https://www.youtube.com/@LiveModeTV_PT';
   }
   const details = `World Cup 2026 match: ${homeTeam} vs ${visitorTeam}\nTransmission: ${transmission || 'TBD'}${watchLink}\n\nMake your prediction at: ${window.location.href}`;
   
   return `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${startDate}/${endDate}&details=${encodeURIComponent(details)}&ctz=Europe/Lisbon`;
}

function showAdminLogin() {
   const password = prompt("Enter admin password to edit scores:");
   if (password === ADMIN_PASSWORD) {
     isAdminMode = true;
     const adminSection = document.getElementById("admin-section");
     if (adminSection) {
       adminSection.style.display = "block";
       loadScoresEditor();
       adminSection.scrollIntoView({ behavior: "smooth" });
     }
   } else if (password) {
     alert("Wrong password!");
   }
 }
 
 function closeAdminMode() {
   isAdminMode = false;
   document.getElementById("admin-section").style.display = "none";
   loadAllData();
 }
 
 function getFlagCode(teamName) {
   const flagMap = {
     'Mexico': 'mx', 'South Africa': 'za', 'South Korea': 'kr', 'Czechia': 'cz',
     'Canada': 'ca', 'Bosnia and Herzegovina': 'ba', 'Bosnia': 'ba', 'Qatar': 'qa', 'Switzerland': 'ch',
     'Brazil': 'br', 'Morocco': 'ma', 'Haiti': 'ht', 'Scotland': 'gb-sct',
     'USA': 'us', 'Paraguay': 'py', 'Australia': 'au', 'Turkey': 'tr',
     'Germany': 'de', 'Curaçao': 'cw', "Côte d'Ivoire": 'ci', 'Ivory Coast': 'ci', 'Ecuador': 'ec',
     'Netherlands': 'nl', 'Japan': 'jp', 'Sweden': 'se', 'Tunisia': 'tn',
     'Belgium': 'be', 'Egypt': 'eg', 'Iran': 'ir', 'New Zealand': 'nz',
     'Spain': 'es', 'Cabo Verde': 'cv', 'Saudi Arabia': 'sa', 'Uruguay': 'uy',
     'France': 'fr', 'Senegal': 'sn', 'Iraq': 'iq', 'Norway': 'no',
     'Argentina': 'ar', 'Algeria': 'dz', 'Austria': 'at', 'Jordan': 'jo',
     'Portugal': 'pt', 'DR Congo': 'cd', 'Uzbekistan': 'uz', 'Colombia': 'co',
     'England': 'gb-eng', 'Croatia': 'hr', 'Ghana': 'gh', 'Panama': 'pa'
   };
   
   for (let [team, code] of Object.entries(flagMap)) {
     if (teamName.includes(team)) {
       return code;
     }
   }
   return null;
 }

function createMatchNameWithFlags(homeTeam, visitorTeam) {
   const flag1 = getFlagCode(homeTeam);
   const flag2 = getFlagCode(visitorTeam);
   const homeWithFlag = flag1 ? `<img src="https://flagcdn.com/20x15/${flag1}.png" class="team-flag" alt="${homeTeam} flag"> ${homeTeam}` : homeTeam;
   const visitorWithFlag = flag2 ? `<img src="https://flagcdn.com/20x15/${flag2}.png" class="team-flag" alt="${visitorTeam} flag"> ${visitorTeam}` : visitorTeam;
   return `${homeWithFlag} vs ${visitorWithFlag}`;
}

function loadScoresEditor() {
   const container = document.getElementById("scores-editor");
   if (!container) return;
   container.innerHTML = "";
   if (Object.keys(groupMatches).length === 0) {
     container.innerHTML = "<p>Loading match data...</p>";
     return;
   }
   
   const sortedGroups = Object.keys(groupMatches).sort();
    for (let group of sortedGroups) {
     const matchesId = `admin-matches-${group.replace(/ /g, '_')}`;
     const groupDiv = document.createElement("div");
     groupDiv.style.marginBottom = "15px";
     groupDiv.style.border = "1px solid #ddd";
     groupDiv.style.borderRadius = "8px";
     groupDiv.style.overflow = "hidden";
     groupDiv.innerHTML = `
       <div class="admin-group-title" onclick="toggleAdminGroup('${matchesId}')">📋 ${group} ▼</div>
       <div id="${matchesId}" class="admin-matches-container" style="padding: 10px 15px; display: none;"></div>
     `;
     const matchesDiv = groupDiv.querySelector(`#${matchesId}`);
     
     groupMatches[group].forEach((matchObj, idx) => {
       const cleanId = `${group.replace(/ /g, '_')}_${idx}`;
       const actual = actualResults[matchObj.match] || {};
       const scoreParts = actual.score ? actual.score.split("-") : ["", ""];
       const homeScore = scoreParts[0];
       const awayScore = scoreParts[1];
       
       const matchDiv = document.createElement("div");
       matchDiv.style.marginBottom = "12px";
       matchDiv.style.padding = "8px";
       matchDiv.style.background = "#f9f9f9";
       matchDiv.style.borderRadius = "5px";
       matchDiv.innerHTML = `
         <strong style="font-size: 0.9em;">${matchObj.match}</strong>
         <div style="margin-top: 6px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
           <span style="font-size: 0.85em;">🏠 Home:</span>
           <input type="number" id="home-${cleanId}" value="${homeScore}" style="width: 50px; padding: 4px; text-align: center;" min="0" max="20">
           <span style="font-size: 0.85em;">✈️ Visitor:</span>
           <input type="number" id="away-${cleanId}" value="${awayScore}" style="width: 50px; padding: 4px; text-align: center;" min="0" max="20">
           <span id="result-preview-${cleanId}" style="font-weight: bold; font-size: 0.8em; margin-left: 5px;"></span>
         </div>
       `;
       matchesDiv.appendChild(matchDiv);
       
       const homeInput = document.getElementById(`home-${cleanId}`);
       const awayInput = document.getElementById(`away-${cleanId}`);
       const resultSpan = document.getElementById(`result-preview-${cleanId}`);
       
       if (homeInput && awayInput && resultSpan) {
         function updatePreview() {
           const home = parseInt(homeInput.value) || 0;
           const away = parseInt(awayInput.value) || 0;
           if (home > away) {
             resultSpan.innerHTML = "→ 🏠 Home Win (1)";
             resultSpan.style.color = "#4CAF50";
           } else if (home < away) {
             resultSpan.innerHTML = "→ ✈️ Visitor Win (2)";
             resultSpan.style.color = "#f44336";
           } else if (home === away && home !== 0) {
             resultSpan.innerHTML = "→ 🤝 Draw (X)";
             resultSpan.style.color = "#FF9800";
           } else {
             resultSpan.innerHTML = "";
           }
         }
         homeInput.addEventListener('input', updatePreview);
         awayInput.addEventListener('input', updatePreview);
         updatePreview();
       }
     });
     container.appendChild(groupDiv);
   }
}

function toggleAdminGroup(groupId) {
   const el = document.getElementById(groupId);
   if (el) el.style.display = el.style.display === "none" ? "block" : "none";
}

async function saveAllScores() {
   const scoreUpdates = [];
   for (let group in groupMatches) {
     for (let i = 0; i < groupMatches[group].length; i++) {
       const cleanId = `${group.replace(/ /g, '_')}_${i}`;
       const matchName = groupMatches[group][i].match;
       const homeScore = document.getElementById(`home-${cleanId}`)?.value;
       const awayScore = document.getElementById(`away-${cleanId}`)?.value;
       if (homeScore !== undefined && awayScore !== undefined && (homeScore !== "" || awayScore !== "")) {
         const home = parseInt(homeScore) || 0;
         const away = parseInt(awayScore) || 0;
         let result = "";
         if (home > away) result = "1";
         else if (home < away) result = "2";
         else if (home === away && home !== 0) result = "X";
         scoreUpdates.push({ match: matchName, homeScore: home, awayScore: away, result: result });
       }
     }
   }
   if (scoreUpdates.length === 0) { alert("No scores to save!"); return; }
   try {
     const params = new URLSearchParams();
     params.append("action", "saveScores");
     params.append("data", JSON.stringify(scoreUpdates));
     await fetch(`${WEBAPP_URL}?${params.toString()}`);
     alert(`✅ ${scoreUpdates.length} match scores saved!`);
     closeAdminMode();
   } catch(e) { alert("Error saving scores: " + e.message); }
}

function updatePlayerDropdown() {
   const select = document.getElementById("playerSelect");
   const currentValue = select.value;
   select.innerHTML = '<option value="">-- Select existing player --</option>';
   currentPlayers.forEach(player => {
     const option = document.createElement("option");
     option.value = player;
     option.textContent = player;
     if (player === currentValue) option.selected = true;
     select.appendChild(option);
   });
}

function selectPlayer() {
   const playerName = document.getElementById("playerSelect").value;
   if (playerName) {
     document.getElementById("playerName").value = playerName;
     loadMyPicks();
   }
}

async function savePicks() {
   const player = document.getElementById("playerName").value.trim();
   if (!player) { alert("Enter your name!"); return; }
   const newPicks = [];
   for (let group in groupMatches) {
     for (let i = 0; i < groupMatches[group].length; i++) {
       const match = groupMatches[group][i].match;
       if (actualResults[match] && actualResults[match].result) continue;
       const matchId = `${group}_${i}`;
       const selected = document.querySelector(`input[name="${matchId}"]:checked`);
       if (selected) newPicks.push({ match: match, pick: selected.value });
     }
   }
   if (newPicks.length === 0) { alert("No picks selected!"); return; }
   try {
     const deleteParams = new URLSearchParams();
     deleteParams.append("action", "deletePlayerPicks");
     deleteParams.append("player", player);
     await fetch(`${WEBAPP_URL}?${deleteParams.toString()}`);
     const params = new URLSearchParams();
     params.append("action", "save");
     params.append("player", player);
     params.append("picks", JSON.stringify(newPicks));
     await fetch(`${WEBAPP_URL}?${params.toString()}`);
     alert(`✅ Saved ${newPicks.length} picks for ${player}!`);
     await loadAllData();
   } catch(e) { alert("Error: " + e.message); }
}

async function loadMyPicks() {
   if (isLoading) return;
   isLoading = true;
   const player = document.getElementById("playerName").value.trim();
   if (!player) { isLoading = false; alert("Enter your name!"); return; }
   try {
     const response = await fetch(`${WEBAPP_URL}?action=load`);
     const data = await response.json();
     if (!data.success) throw new Error(data.error);
     const userPicks = data.picks.filter(p => p.player === player);
     for (let group in groupMatches) {
       for (let i = 0; i < groupMatches[group].length; i++) {
         const matchId = `${group}_${i}`;
         document.querySelectorAll(`input[name="${matchId}"]`).forEach(r => r.checked = false);
       }
     }
     userPicks.forEach(pick => {
       for (let group in groupMatches) {
         const idx = groupMatches[group].findIndex(m => m.match === pick.match);
         if (idx !== -1) {
           const radio = document.querySelector(`input[name="${group}_${idx}"][value="${pick.pick}"]`);
           if (radio) radio.checked = true;
           break;
         }
       }
     });
     updateProgress();
     alert(`✅ Loaded ${userPicks.length} picks for ${player}`);
   } catch(e) { alert("Error: " + e.message); } finally { isLoading = false; }
}

async function loadAllData() {
   if (isLoading) return;
   isLoading = true;
   try {
     const response = await fetch(`${WEBAPP_URL}?action=load`);
     const data = await response.json();
     if (!data.success) throw new Error(data.error);
     allPicks = data.picks || [];
     actualResults = data.results || {};
     
     if (data.matches && data.matches.length > 0) {
       for (let group in groupMatches) delete groupMatches[group];
       data.matches.forEach(match => {
         const groupName = match.group || "Other";
         if (!groupMatches[groupName]) groupMatches[groupName] = [];
         const matchDisplayName = createMatchNameWithFlags(match.homeTeam, match.visitorTeam);
         
         // Debug: log the date to see what's coming from the sheet
         console.log(`Match: ${match.name}, Date: ${match.date}, Time: ${match.time}`);
         
         groupMatches[groupName].push({ 
           match: match.name, 
           date: match.date,
           time: match.time,
           displayMatch: matchDisplayName,
           transmission: match.transmission,
           homeTeam: match.homeTeam,
           visitorTeam: match.visitorTeam,
           isCompleted: actualResults[match.name] && actualResults[match.name].result
         });
       });
     }
     
     const playerSet = new Set();
     allPicks.forEach(p => playerSet.add(p.player));
     currentPlayers = Array.from(playerSet).sort();
     updatePlayerDropdown();
     loadMatches();
     updateTodayMatches();
     
      const playerScores = [];
      for (let player of currentPlayers) {
        let score = 0, total = 0;
        const playerPicks = allPicks.filter(p => p.player === player);
        for (let group in groupMatches) {
          for (let m of groupMatches[group]) {
            const actual = actualResults[m.match];
            const pick = playerPicks.find(p => p.match === m.match);
            // Only count if the player actually made a pick for this match AND the match has a result
            if (actual && actual.result && pick) {
              total++;
              if (pick.pick === actual.result) score++;
            }
          }
        }
        playerScores.push({ name: player, score: score, total: total });
      }
     playerScores.sort((a,b) => b.score - a.score);
     const leaderboardDiv = document.getElementById("leaderboard");
     const leaderboardList = document.getElementById("leaderboard-list");
     if (playerScores.length > 0) {
       leaderboardDiv.style.display = "block";
       leaderboardList.innerHTML = "";
       playerScores.forEach((p, i) => {
         const percent = p.total > 0 ? Math.round(p.score/p.total*100) : 0;
         leaderboardList.innerHTML += `<li><strong>${p.name}</strong> - ${p.score}/${p.total} (${percent}%) ${i === 0 ? "🏆" : ""}</li>`;
       });
     }
     updateProgress();
   } catch(e) { alert("Error loading: " + e.message); } finally { isLoading = false; }
}

function getResultSymbol(result) {
   if (result === "1") return "🏠1";
   if (result === "X") return "🤝X";
   if (result === "2") return "✈️2";
   return "?";
}

function getResultBadgeClass(result) {
   if (result === "1") return "result-home";
   if (result === "X") return "result-draw";
   if (result === "2") return "result-away";
   return "result-none";
}

function calculateGroupStandings(groupName, matchesArray) {
   const standings = {};
   matchesArray.forEach(match => {
     if (!match.displayMatch) return;
     const teams = match.displayMatch.split(" vs ");
     if (teams.length === 2) {
       const tempDiv = document.createElement('div');
       tempDiv.innerHTML = teams[0];
       const team1 = tempDiv.textContent || tempDiv.innerText || teams[0];
       tempDiv.innerHTML = teams[1];
       const team2 = tempDiv.textContent || tempDiv.innerText || teams[1];
       if (!standings[team1]) standings[team1] = { played: 0, won: 0, draw: 0, lost: 0, points: 0 };
       if (!standings[team2]) standings[team2] = { played: 0, won: 0, draw: 0, lost: 0, points: 0 };
     }
   });
   matchesArray.forEach(match => {
     if (!match.displayMatch) return;
     const teams = match.displayMatch.split(" vs ");
     if (teams.length === 2) {
       const tempDiv = document.createElement('div');
       tempDiv.innerHTML = teams[0];
       const team1 = tempDiv.textContent || tempDiv.innerText || teams[0];
       tempDiv.innerHTML = teams[1];
       const team2 = tempDiv.textContent || tempDiv.innerText || teams[1];
       const actual = actualResults[match.match];
       if (actual && actual.result) {
         standings[team1].played++;
         standings[team2].played++;
         if (actual.result === "1") {
           standings[team1].won++;
           standings[team1].points += 3;
           standings[team2].lost++;
         } else if (actual.result === "2") {
           standings[team2].won++;
           standings[team2].points += 3;
           standings[team1].lost++;
         } else if (actual.result === "X") {
           standings[team1].draw++;
           standings[team1].points += 1;
           standings[team2].draw++;
           standings[team2].points += 1;
         }
       }
     }
   });
   return Object.entries(standings).map(([name, stats]) => ({ name, ...stats })).sort((a, b) => b.points - a.points);
}

   if (standings.length === 0) return '';
   
   let html = `
     <div class="group-standings">
       <table border="1" cellpadding="4" cellspacing="0" style="border-collapse: collapse; width: 100%;">
         <thead>
           <tr>
             <th style="border: 1px solid #3a4a5a; padding: 8px; text-align: left;">Team</th>
             <th style="border: 1px solid #3a4a5a; padding: 8px; text-align: center;">P</th>
             <th style="border: 1px solid #3a4a5a; padding: 8px; text-align: center;">W</th>
             <th style="border: 1px solid #3a4a5a; padding: 8px; text-align: center;">D</th>
             <th style="border: 1px solid #3a4a5a; padding: 8px; text-align: center;">L</th>
             <th style="border: 1px solid #3a4a5a; padding: 8px; text-align: center;">Pts</th>
           </tr>
         </thead>
         <tbody>
   `;
   
   standings.forEach(team => {
     const flagCode = getFlagCode(team.name);
     const teamWithFlag = flagCode ? `<img src="https://flagcdn.com/20x15/${flagCode}.png" class="team-flag" alt="${team.name} flag"> ${team.name}` : team.name;
     
     html += `
       <tr>
         <td style="border: 1px solid #ddd; padding: 6px; text-align: left;"><strong>${teamWithFlag}</strong></td>
         <td style="border: 1px solid #ddd; padding: 6px; text-align: center;">${team.played}</td>
         <td style="border: 1px solid #ddd; padding: 6px; text-align: center;">${team.won}</td>

         <td style="border: 1px solid #ddd; padding: 6px; text-align: center;"><strong>${team.points}</strong></td>
       </tr>
     `;
   });
   
   html += `
         </tbody>
        </table>

   return html;
}

function loadMatches() {
   const container = document.getElementById("group-matches");
   container.innerHTML = "";
   
   const sortedGroups = Object.keys(groupMatches).sort();
   
   for (let group of sortedGroups) {
     const groupDiv = document.createElement("div");
     groupDiv.className = "group-block";
     groupDiv.innerHTML = `<div class="group-title" onclick="toggleGroup('${group.replace(/ /g, '_')}')">📋 ${group} ▼</div>`;
     const matchesDiv = document.createElement("div");
     matchesDiv.id = `group-${group.replace(/ /g, '_')}`;
     matchesDiv.style.display = "none";
     const standings = calculateGroupStandings(group, groupMatches[group]);
     const standingsHtml = createStandingsTable(standings);
     if (standingsHtml) matchesDiv.innerHTML = standingsHtml;
     
     groupMatches[group].forEach((matchObj, idx) => {
       const matchId = `${group}_${idx}`;
       const actual = actualResults[matchObj.match];
       const actualResult = actual ? actual.result : null;
       const actualScore = actual ? actual.score : null;
       const isCompleted = actualResult !== null;
       
      const matchDateTime = parseMatchDateTime(matchObj.date, matchObj.time);
      const now = new Date();
      const isPast = matchDateTime ? now >= matchDateTime : false;

      // Debug log - remove after testing
      if (matchObj.match === "Ivory Coast vs Ecuador") {
        console.log(`Match: ${matchObj.match}`);
        console.log(`  matchDateTime: ${matchDateTime}`);
        console.log(`  now: ${now}`);
        console.log(`  isPast: ${isPast}`);
      }
       const isWithinThreeHours = matchDateTime ? isWithinThreeHoursAfter(matchDateTime) : false;
       const showTransmission = (!isPast || (isPast && isWithinThreeHours)) && matchObj.transmission;
       
       const playerPicks = [];
       for (let player of currentPlayers) {
         const pick = allPicks.find(p => p.player === player && p.match === matchObj.match);
         if (pick) playerPicks.push({ name: player, pick: pick.pick, correct: actualResult && pick.pick === actualResult });
       }
       
       const matchDiv = document.createElement("div");
       matchDiv.className = `match-card ${isCompleted ? 'completed' : ''}`;
       matchDiv.id = `match-${group.replace(/ /g, '_')}-${idx}`;
       
       let resultBadge = '';
       if (actualResult && actualScore) resultBadge = `<span class="match-result-badge ${getResultBadgeClass(actualResult)}">${getResultSymbol(actualResult)} (${actualScore})</span>`;
       else if (actualResult) resultBadge = `<span class="match-result-badge ${getResultBadgeClass(actualResult)}">${getResultSymbol(actualResult)}</span>`;
       else resultBadge = `<span class="match-result-badge result-none">? - ?</span>`;
       
       const formattedDateTime = formatDisplayDate(matchObj.date, matchObj.time);
       
       let timeDisplay = '';
       
       if (!isPast && matchObj.date && matchObj.time) {
         const homeTeamClean = matchObj.homeTeam || '';
         const visitorTeamClean = matchObj.visitorTeam || '';
         if (homeTeamClean && visitorTeamClean) {
           const calUrl = getGoogleCalendarUrl(matchObj.match, homeTeamClean, visitorTeamClean, matchObj.date, matchObj.time, matchObj.transmission);
           if (calUrl) {
             timeDisplay = `<a href="${calUrl}" target="_blank" class="calendar-link-time" onclick="event.stopPropagation()" title="Click to add to Google Calendar">📅 ${formattedDateTime}</a>`;
           } else {
             timeDisplay = `<span class="match-time">📅 ${formattedDateTime}</span>`;
           }
         } else {
           timeDisplay = `<span class="match-time">📅 ${formattedDateTime}</span>`;
         }
       } else {
         timeDisplay = `<span class="match-time">📅 ${formattedDateTime}</span>`;
       }
       
       if (showTransmission) {
         if (matchObj.transmission && matchObj.transmission.includes('LiveModeTV')) {
           timeDisplay += `<a href="https://www.youtube.com/@LiveModeTV_PT" target="_blank" class="transmission-link" onclick="event.stopPropagation()">📺 ${matchObj.transmission}</a>`;
         } else if (matchObj.transmission) {
           timeDisplay += `<span class="transmission-info">📺 ${matchObj.transmission}</span>`;
         }
       }
       
       let picksHtml = '';
       if (playerPicks.length > 0) {
         picksHtml = '<div class="picks-row">';
         for (let pp of playerPicks) {
           let pickSymbol = pp.pick === "1" ? "🏠1" : (pp.pick === "X" ? "🤝X" : "✈️2");
           picksHtml += `<div class="player-pick"><span class="player-name">${pp.name}</span><span class="player-pick-value ${pp.correct ? 'pick-correct' : 'pick-wrong'}">${pickSymbol}</span>${pp.correct ? '<span>✓</span>' : ''}</div>`;
         }
         picksHtml += '</div>';
       }
       
        let radioHtml = '';
        // Lock picks if match has a result OR match start time has passed
        if (!isCompleted && !isPast) {
          radioHtml = `<div class="radio-group"><label><input type="radio" name="${matchId}" value="1" onchange="markUnsaved('${matchId}')"> 🏠 Home Win (1)</label><label><input type="radio" name="${matchId}" value="X" onchange="markUnsaved('${matchId}')"> 🤝 Draw (X)</label><label><input type="radio" name="${matchId}" value="2" onchange="markUnsaved('${matchId}')"> ✈️ Visitor Win (2)</label></div>`;
        } else if (!isCompleted && isPast) {
          radioHtml = `<div class="radio-group disabled"><span class="deadline-note" style="color:#f44336; font-size:0.8em;">⏰ Deadline passed · picks locked</span></div>`;
        } else {
          radioHtml = `<div class="radio-group disabled"></div>`;
        }
       
       matchDiv.innerHTML = `<div class="match-header"><span class="match-name">${matchObj.displayMatch}</span>${timeDisplay}${resultBadge}</div>${picksHtml}${radioHtml}`;
       matchesDiv.appendChild(matchDiv);
     });
     groupDiv.appendChild(matchesDiv);
     container.appendChild(groupDiv);
   }
   updateProgress();
}

function getTodaysMatches() {
   const today = new Date();
   today.setHours(0, 0, 0, 0);
   const tomorrow = new Date(today);
   tomorrow.setDate(tomorrow.getDate() + 1);
   
   const todaysMatches = [];
   
   for (let group in groupMatches) {
     for (let idx = 0; idx < groupMatches[group].length; idx++) {
       const match = groupMatches[group][idx];
       const matchDateTime = parseMatchDateTime(match.date, match.time);
       if (matchDateTime) {
         const matchDate = new Date(matchDateTime);
         matchDate.setHours(0, 0, 0, 0);
         // Check if match is today AND not completed yet
         if (matchDate.getTime() === today.getTime() && !actualResults[match.match]?.result) {
           todaysMatches.push({
             group: group,
             idx: idx,
             match: match,
             displayName: match.displayMatch,
             time: match.time
           });
         }
       }
     }
   }
   return todaysMatches;
}

function scrollToMatch(groupId, matchElementId, groupName, matchIdx) {
   // Expand the group if it's collapsed
   const groupDiv = document.getElementById(groupId);
   if (groupDiv && groupDiv.style.display === "none") {
     groupDiv.style.display = "block";
   }
   
   // Scroll to the match
   const matchElement = document.getElementById(matchElementId);
   if (matchElement) {
     matchElement.scrollIntoView({ behavior: "smooth", block: "center" });
     // Add a temporary highlight effect
     matchElement.style.transition = "background 0.3s";
     matchElement.style.background = "#fff3cd";
     setTimeout(() => {
       matchElement.style.background = "";
     }, 2000);
   } else {
     // If match element doesn't have an ID yet, we need to add IDs when creating matches
     // For now, just scroll to the group
     const groupBlock = document.querySelector(`.group-title:contains("${groupName}")`)?.closest('.group-block');
     if (groupBlock) {
       groupBlock.scrollIntoView({ behavior: "smooth", block: "start" });
     }
   }
}

function createTodaysMatchesSection() {
   const todaysMatches = getTodaysMatches();
   if (todaysMatches.length === 0) return '';
   
   let html = `
     <div style="background: linear-gradient(135deg, #ff9800 0%, #ff5722 100%); color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
       <h3 style="margin: 0 0 10px 0; font-size: 1.2em;">⚡ Today's Matches</h3>
   `;
   
   todaysMatches.forEach((tm, idx) => {
     const groupId = `group-${tm.group.replace(/ /g, '_')}`;
     const matchElementId = `match-${tm.group.replace(/ /g, '_')}-${tm.idx}`;
     
     let transmissionHtml = '';
     if (tm.match.transmission) {
       if (tm.match.transmission.includes('LiveModeTV')) {
         // This link is valid and independent
         transmissionHtml = `<a href="https://www.youtube.com/@LiveModeTV_PT" target="_blank" style="color: white; text-decoration: none; border-radius: 8px;" onclick="event.stopPropagation();">📺 ${tm.match.transmission}</a>`;
       } else {
         transmissionHtml = `<span>📺 ${tm.match.transmission}</span>`;
       }
     }
     
     const formattedTime = formatDisplayDate(tm.match.date, tm.match.time);
     const marginBottom = idx === todaysMatches.length - 1 ? '0' : '6px';
     
     // Use a div instead of an anchor – no nested links
     html += `
       <div onclick="scrollToMatch('${groupId}', '${matchElementId}', '${tm.group}', ${tm.idx});"

           <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">

           ${transmissionHtml}
         </div>
       </div>
     `;
   });
   
   html += `</div>`;
   return html;
}

function updateTodayMatches() {
   const container = document.getElementById("today-matches-container");
   if (!container) return;
   const sectionHtml = createTodaysMatchesSection();
   if (sectionHtml) {
     container.style.display = "block";
     container.innerHTML = sectionHtml;
   } else {
     container.style.display = "none";
     container.innerHTML = "";
   }
}

function toggleGroup(id) {
   const el = document.getElementById(`group-${id}`);
   if (el) el.style.display = el.style.display === "none" ? "block" : "none";
}

function markUnsaved(matchId) { updateProgress(); }

function updateProgress() {
   let total = 0, saved = 0;
   for (let group in groupMatches) {
     for (let i = 0; i < groupMatches[group].length; i++) {
       const match = groupMatches[group][i].match;
       if (!actualResults[match] || !actualResults[match].result) {
         total++;
         if (document.querySelector(`input[name="${group}_${i}"]:checked`)) saved++;
       }
     }
   }
   const percent = total > 0 ? Math.round(saved/total*100) : 0;
   document.getElementById("progress-container").innerHTML = `<div class="progress-bar"><div class="progress-fill" style="width:${percent}%">${percent}% Complete (${saved}/${total} upcoming matches)</div></div>`;
}

function initTabs() {
   document.querySelectorAll('.stage-tab').forEach(tab => {
     tab.addEventListener('click', () => {
       document.querySelectorAll('.stage-tab').forEach(t => t.classList.remove('active'));
       tab.classList.add('active');
       document.querySelectorAll('.matches-container').forEach(c => c.classList.remove('active'));
       document.getElementById(`${tab.dataset.stage}-matches`).classList.add('active');
     });
   });
}

async function shareApp() {
  const shareData = {
    title: 'World Cup 2026 Predictor',
    text: 'Make your predictions for World Cup 2026!',
    url: window.location.href
  };

  try {
    if (navigator.share && navigator.canShare(shareData)) {
      await navigator.share(shareData);
    } else {
      await navigator.clipboard.writeText(window.location.href);
      showShareFeedback('✅ Link copied! Share with friends.');
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      console.error('Share failed:', err);
      showShareFeedback('📋 Copy this link: ' + window.location.href);
    }
  }
}
